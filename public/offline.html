<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KI-CO Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: #f8efe4;
        background:
          radial-gradient(circle at 24% 10%, rgba(220, 189, 168, .16), transparent 34%),
          linear-gradient(145deg, #15110e, #070605);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(90vw, 28rem);
        padding: 2rem 1.4rem;
        text-align: center;
      }
      svg {
        width: 54px;
        height: 54px;
        margin-bottom: 1rem;
      }
      h1 {
        margin: 0 0 .7rem;
        font-size: 1.18rem;
        font-weight: 700;
      }
      p {
        margin: 0;
        color: rgba(248, 239, 228, .72);
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <line x1="2.5" y1="7" x2="11.5" y2="7" stroke="#dcbda8" stroke-width="0.65" opacity="0.6" />
        <line x1="7" y1="0.5" x2="7" y2="13.5" stroke="#dcbda8" stroke-width="0.65" opacity="0.6" />
        <path d="M7 0.8 C7 4.2 9.0 6.5 10.8 7 C9.0 7.5 7 9.8 7 13.2 C7 9.8 5.0 7.5 3.2 7 C5.0 6.5 7 4.2 7 0.8 Z" fill="#dcbda8" />
      </svg>
      <h1>KI-CO 暂时离线</h1>
      <p>如果你之前已经在这台设备打开过小屋，浏览器会尽量使用缓存回到房间。API 对话仍需要网络。</p>
    </main>
  </body>
</html>
